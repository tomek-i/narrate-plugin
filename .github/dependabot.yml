version: 2
updates:
  # npm/pnpm dependencies across the workspace.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine updates into one PR to cut noise.
      dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Major bumps are breaking; handle them deliberately, not via auto-PRs.
    # (Security updates still come through regardless of this ignore.)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned to current versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
