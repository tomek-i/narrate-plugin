name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; jobs opt into more if they ever need it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm --filter @narrate/core build

      - name: Ensure the committed plugin bundle is up to date
        run: |
          if ! git diff --exit-code -- packages/plugin/bin/narrate.mjs; then
            echo "::error::packages/plugin/bin/narrate.mjs is stale. Run 'pnpm --filter @narrate/core build' and commit the result."
            exit 1
          fi
