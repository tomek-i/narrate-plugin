<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Narrate smoke test</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; }
      section { height: 100vh; display: grid; place-items: center; font-size: 3rem; }
      #a { background: #1e293b; color: #f8fafc; }
      #b { background: #f8fafc; color: #1e293b; }
    </style>
  </head>
  <body>
    <section id="a">Hello</section>
    <section id="b">
      <form id="signup" onsubmit="event.preventDefault(); document.getElementById('done').hidden = false;">
        <input id="email" type="email" placeholder="email" />
        <button type="submit">Sign up</button>
      </form>
      <p id="done" hidden>Welcome!</p>
    </section>
  </body>
</html>
